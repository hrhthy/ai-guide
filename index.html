  const wikiUrl = s.wiki_page?.startsWith('http')
    ? s.wiki_page
    : `${GITLAB_WIKI_BASE}/${s.wiki_page || s.name.replace(/\s+/g, '-')}`;

  return `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-name">
            ${s.name}
            ${s.hot  ? '<span class="badge badge-hot">HOT</span>' : ''}
            ${s.isnew? '<span class="badge badge-new">NEW</span>' : ''}
          </div>
          <div class="card-company">${s.company}</div>
        </div>
        <span class="cat-pill2 p-${s.cat}">${s.cat}</span>
      </div>
      <div class="card-desc">${s.desc}</div>
      <div class="card-links">
        <a class="link-site"  href="${s.url}"   target="_blank" rel="noopener">사이트 ↗</a>
        ${s.docs  ? `<a class="link-docs"  href="${s.docs}"  target="_blank" rel="noopener">공식문서 ↗</a>` : ''}
        <a class="link-guide" href="${wikiUrl}" target="_blank" rel="noopener">사용가이드 ↗</a>
      </div>
    </div>`;
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const items = SERVICES.filter(s => {
    const catOk = activeCat === "all" || s.cat === activeCat;
    const qOk = !q || [s.name, s.company, s.desc, s.cat].some(v => v.toLowerCase().includes(q));
    return catOk && qOk;
  });
  document.getElementById("count").textContent = items.length + "개 서비스";
  const container = document.getElementById("sections");
  if (!items.length) {
    container.innerHTML = '<div class="empty" style="display:block;">검색 결과가 없습니다.</div>';
    return;
  }

  const order = CATS.filter(c => c !== "all");
  const grouped = {};
  items.forEach(s => {
    if (!grouped[s.cat]) grouped[s.cat] = [];
    grouped[s.cat].push(s);
  });

  const activeCats = activeCat === "all" ? order.filter(c => grouped[c]) : [activeCat];

  container.innerHTML = activeCats.map(cat => {
    if (!grouped[cat]) return '';
    const catItems = grouped[cat];
    return `
      <div class="cat-section">
        <div class="cat-section-header">
          <span class="cat-pill p-${cat}">${cat}</span>
          <span class="cat-section-title">${catLabel(cat)}</span>
          <span class="cat-section-count">${catItems.length}개</span>
          <div class="cat-section-line"></div>
        </div>
        <div class="grid">${catItems.map(cardHTML).join("")}</div>
      </div>`;
  }).join("");
}

function catLabel(cat) {
  const labels = {
    "LLM":"LLM / Chat", "이미지":"이미지 / 디자인", "코드":"코드 어시스턴트",
    "영상":"영상 생성", "검색":"검색 / 리서치", "음성":"음성 / 음악",
    "문서":"문서 / 생산성", "에이전트":"에이전트"
  };
  return labels[cat] || cat;
}

buildFilters();
render();
</script>
</body>
</html>
